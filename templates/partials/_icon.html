{% with size=size|default:20 %}<svg xmlns="http://www.w3.org/2000/svg" width="{{ size }}" height="{{ size }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="icon">
{% if name == 'menu' %}
    <line x1="4" y1="7" x2="20" y2="7"></line>
    <line x1="4" y1="12" x2="20" y2="12"></line>
    <line x1="4" y1="17" x2="20" y2="17"></line>
{% elif name == 'dashboard' %}
    <rect x="3.5" y="3.5" width="7" height="7" rx="1.5"></rect>
    <rect x="13.5" y="3.5" width="7" height="7" rx="1.5"></rect>
    <rect x="3.5" y="13.5" width="7" height="7" rx="1.5"></rect>
    <rect x="13.5" y="13.5" width="7" height="7" rx="1.5"></rect>
{% elif name == 'users' %}
    <circle cx="9" cy="8" r="3.2"></circle>
    <path d="M3.5 20c0-3.3 2.5-5.5 5.5-5.5s5.5 2.2 5.5 5.5"></path>
    <path d="M15.5 5.2c1.5.5 2.5 1.9 2.5 3.4s-1 2.9-2.5 3.4"></path>
    <path d="M17.5 14.7c2 .6 3 2.4 3 4.3"></path>
{% elif name == 'credit-card' %}
    <rect x="2.5" y="5.5" width="19" height="13" rx="2.2"></rect>
    <line x1="2.5" y1="10" x2="21.5" y2="10"></line>
    <line x1="6" y1="14.5" x2="10" y2="14.5"></line>
{% elif name == 'briefcase' %}
    <rect x="2.5" y="7.5" width="19" height="12" rx="2"></rect>
    <path d="M8 7.5V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v1.5"></path>
    <line x1="2.5" y1="12.5" x2="21.5" y2="12.5"></line>
{% elif name == 'shield' %}
    <path d="M12 3.5l7 2.5v5c0 4.5-3 7.8-7 9.5-4-1.7-7-5-7-9.5V6l7-2.5z"></path>
    <path d="M9 12l2 2 4-4"></path>
{% elif name == 'bell' %}
    <path d="M6 10a6 6 0 1 1 12 0c0 4 1.4 5.2 1.4 5.2H4.6S6 14 6 10z"></path>
    <path d="M10.3 18.5a1.9 1.9 0 0 0 3.4 0"></path>
{% elif name == 'user' %}
    <circle cx="12" cy="8.3" r="3.6"></circle>
    <path d="M5 20c0-3.6 3.1-6.2 7-6.2s7 2.6 7 6.2"></path>
{% elif name == 'chevron-down' %}
    <polyline points="5.5 9 12 15.5 18.5 9"></polyline>
{% elif name == 'plus' %}
    <line x1="12" y1="5" x2="12" y2="19"></line>
    <line x1="5" y1="12" x2="19" y2="12"></line>
{% elif name == 'edit' %}
    <path d="M4 20l.9-4L16 4.9a1.8 1.8 0 0 1 2.5 0l.6.6a1.8 1.8 0 0 1 0 2.5L8 19l-4 1z"></path>
    <line x1="14.2" y1="6.7" x2="17.3" y2="9.8"></line>
{% elif name == 'lock' %}
    <rect x="4.5" y="10.5" width="15" height="10" rx="2"></rect>
    <path d="M7.5 10.5V7a4.5 4.5 0 0 1 9 0v3.5"></path>
{% elif name == 'check' %}
    <polyline points="5 12.5 9.5 17 19 6"></polyline>
{% elif name == 'arrow-left' %}
    <line x1="19" y1="12" x2="5" y2="12"></line>
    <polyline points="10.5 6 5 12 10.5 18"></polyline>
{% elif name == 'calendar' %}
    <rect x="3.5" y="5.5" width="17" height="15" rx="2"></rect>
    <line x1="3.5" y1="10" x2="20.5" y2="10"></line>
    <line x1="8" y1="3" x2="8" y2="7"></line>
    <line x1="16" y1="3" x2="16" y2="7"></line>
{% elif name == 'file-text' %}
    <path d="M7 3.5h7l4 4v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-16a1 1 0 0 1 1-1z"></path>
    <line x1="9" y1="12" x2="15" y2="12"></line>
    <line x1="9" y1="15.5" x2="15" y2="15.5"></line>
{% elif name == 'cash' %}
    <rect x="2.5" y="6.5" width="19" height="11" rx="2"></rect>
    <circle cx="12" cy="12" r="2.6"></circle>
    <line x1="5.5" y1="9.5" x2="5.5" y2="9.5"></line>
    <line x1="18.5" y1="14.5" x2="18.5" y2="14.5"></line>
{% elif name == 'logout' %}
    <path d="M14.5 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h6.5a2 2 0 0 0 2-2v-2"></path>
    <line x1="9.5" y1="12" x2="21" y2="12"></line>
    <polyline points="17.5 8 21.5 12 17.5 16"></polyline>
{% elif name == 'home' %}
    <path d="M4 11.5L12 4l8 7.5"></path>
    <path d="M6 10v9.5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V10"></path>
{% elif name == 'trending-up' %}
    <polyline points="4 16 10 9.5 14 13 20 6"></polyline>
    <polyline points="14 6 20 6 20 12"></polyline>
{% elif name == 'clock' %}
    <circle cx="12" cy="12" r="8.5"></circle>
    <polyline points="12 7.5 12 12 15.5 14.5"></polyline>
{% elif name == 'search' %}
    <circle cx="10.8" cy="10.8" r="6.3"></circle>
    <line x1="15.5" y1="15.5" x2="20.5" y2="20.5"></line>
{% endif %}
</svg>{% endwith %}
