{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión · Portal IMFDC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <span class="icon-badge">{% include 'partials/_icon.html' with name='shield' size=24 %}</span>
            <h1>Portal IMFDC</h1>
            <p class="subtitle">Acceso administrativo</p>

            <form method="POST">
                {% csrf_token %}

                {% if form.errors %}
                    <div class="alert alert-error">Usuario o contraseña incorrectos.</div>
                {% endif %}

                <div class="field">
                    <label for="username">Usuario</label>
                    <input type="text" name="username" id="username" required>
                </div>

                <div class="field">
                    <label for="password">Contraseña</label>
                    <input type="password" name="password" id="password" required>
                </div>

                <button type="submit" class="btn btn-accent">Ingresar</button>
            </form>
        </div>
    </div>
</body>
</html>
